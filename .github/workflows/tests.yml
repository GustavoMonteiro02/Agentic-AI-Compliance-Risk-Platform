name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install -r requirements.txt
      - run: python scripts/security_check.py
      - run: pytest
      - name: Build React command center
        working-directory: frontend/react_app
        run: |
          npm install
          npm run build
